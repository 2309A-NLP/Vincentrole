<!DOCTYPE html>
<html lang="zh">
<head><meta charset="utf-8"><title>工单14 架构图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;justify-content:center;padding:40px;font-family:'Segoe UI',sans-serif}
svg{width:800px;height:650px}
text{font-family:'Segoe UI',sans-serif}
.box{fill:#1a2332;stroke:#30363d;stroke-width:2;rx:8;ry:8}
.title{fill:#58a6ff;font-size:15px;font-weight:600}
.desc{fill:#8b949e;font-size:12px}
.arrow{stroke:#58a6ff;stroke-width:2;fill:none;marker-end:url(#a)}
.bad{fill:#f85149;font-size:13px;font-weight:600}
.good{fill:#3fb950;font-size:13px;font-weight:600}
.tag{fill:#d2a8ff;font-size:11px}
</style>
</head>
<body>
<svg viewBox="0 0 800 650">
<defs>
<marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
</marker>
</defs>

<!-- 标题 -->
<text x="400" y="30" fill="#f0f6fc" font-size="18" font-weight="700" text-anchor="middle">工单14 — 低质量工业PDF解析与VLM问答架构</text>

<!-- 输入 -->
<rect class="box" x="300" y="55" width="200" height="60"/>
<text class="title" x="400" y="78" text-anchor="middle">📄 专利PDF输入</text>
<text class="desc" x="400" y="98" text-anchor="middle">CN100342976C.pdf (8页全图片)</text>
<text class="tag" x="400" y="113" text-anchor="middle">扫描件/无文字层</text>

<line class="arrow" x1="400" y1="115" x2="400" y2="155"/>

<!-- 解析层 -->
<rect x="100" y="155" width="600" height="130" fill="none" stroke="#30363d" stroke-width="1" rx="10"/>
<text x="115" y="178" fill="#f0f6fc" font-size="14">PDF解析层</text>

<rect class="box" x="130" y="195" width="170" height="75"/>
<text class="title" x="215" y="218" text-anchor="middle">🔍 RAGFlow Deepdoc</text>
<text class="desc" x="215" y="238" text-anchor="middle">OCR文字识别</text>
<text class="desc" x="215" y="253" text-anchor="middle">布局分析+表格检测</text>
<text class="desc" x="215" y="268" text-anchor="middle">Chunking</text>

<text x="330" y="233" fill="#8b949e" font-size="28">→</text>

<rect class="box" x="370" y="195" width="300" height="75"/>
<text class="title" x="520" y="218" text-anchor="middle">🖼 图片提取 (fitz + PIL)</text>
<text class="desc" x="520" y="238" text-anchor="middle">200 DPI 逐页导出 PNG</text>
<text class="desc" x="520" y="253" text-anchor="middle">8页 → 8张图片</text>
<text class="desc" x="520" y="268" text-anchor="middle">供 VLM 视觉理解</text>

<line class="arrow" x1="400" y1="285" x2="400" y2="325"/>

<!-- 问答管道 -->
<rect x="100" y="325" width="600" height="130" fill="none" stroke="#30363d" stroke-width="1" rx="10"/>
<text x="115" y="348" fill="#f0f6fc" font-size="14">问答管道</text>

<rect class="box" x="130" y="365" width="220" height="75"/>
<text class="title" x="240" y="388" text-anchor="middle">📝 文本类问题 (Group 1)</text>
<text class="desc" x="240" y="408" text-anchor="middle">RAGFlow 全文检索</text>
<text class="desc" x="240" y="423" text-anchor="middle">+ 关键词匹配</text>
<text class="desc" x="240" y="438" text-anchor="middle">Q1-Q2: 发明人/特征</text>

<rect class="box" x="450" y="365" width="220" height="75" stroke="#d2a8ff" stroke-width="2"/>
<text class="title" x="560" y="388" text-anchor="middle" fill="#d2a8ff">👁 视觉类问题 (Group 2)</text>
<text class="desc" x="560" y="408" text-anchor="middle">qwen-vl-plus 多模态</text>
<text class="desc" x="560" y="423" text-anchor="middle">图片+问题联合推理</text>
<text class="desc" x="560" y="438" text-anchor="middle">Q3-Q6: 位置/尺寸/结构</text>

<line class="arrow" x1="240" y1="440" x2="240" y2="490"/>
<line class="arrow" x1="560" y1="440" x2="560" y2="490"/>

<!-- 结果 -->
<rect class="box" x="130" y="490" width="540" height="70" stroke="#3fb950" stroke-width="2"/>
<text class="title" x="400" y="518" text-anchor="middle" fill="#3fb950">✅ 测试结果</text>
<text class="desc" x="400" y="538" text-anchor="middle">第1轮: 3/6 正确 (50%) → 第2轮: 6/6 正确 (100%)</text>
<text class="desc" x="400" y="553" text-anchor="middle">VL 提示词优化后全部正确</text>

<!-- 图例 -->
<text x="30" y="600" fill="#8b949e" font-size="11">关键: deepdoc OCR提取文字 → VL识别图片 → 双通道互补</text>
<text x="30" y="620" fill="#8b949e" font-size="11">提示词优化策略: 明确上下文指引 + 指定专利部分</text>
</svg>
</body>
</html>
