<!DOCTYPE html>
<html lang="zh">
<head><meta charset="utf-8"><title>工单10 部署架构</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;justify-content:center;padding:40px;font-family:'Segoe UI',sans-serif}
svg{width:800px;height:600px}
text{font-family:'Segoe UI',sans-serif}
.box{fill:#1a2332;stroke:#30363d;stroke-width:2;rx:8;ry:8}
.title{fill:#58a6ff;font-size:15px;font-weight:600}
.desc{fill:#8b949e;font-size:12px}
.arrow{stroke:#58a6ff;stroke-width:2;fill:none;marker-end:url(#arrow)}
.label{fill:#8b949e;font-size:11px}
</style>
</head>
<body>
<svg viewBox="0 0 800 600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
</marker>
</defs>

<!-- 用户 -->
<rect class="box" x="300" y="20" width="200" height="60"/>
<text class="title" x="400" y="48" text-anchor="middle">👤 用户</text>
<text class="desc" x="400" y="68" text-anchor="middle">浏览器访问 localhost:8520</text>

<line class="arrow" x1="400" y1="80" x2="400" y2="130"/>

<!-- Docker 容器 -->
<rect x="180" y="130" width="440" height="340" fill="none" stroke="#3fb950" stroke-width="2" rx="12"/>
<text x="200" y="158" fill="#3fb950" font-size="14" font-weight="600">🐳 Docker 容器 (finance-qa)</text>

<rect class="box" x="220" y="175" width="360" height="50"/>
<text class="title" x="400" y="198" text-anchor="middle">Streamlit 服务 (端口 8501)</text>
<text class="desc" x="400" y="218" text-anchor="middle">宿主机端口映射: 8520 → 8501</text>

<line class="arrow" x1="400" y1="225" x2="400" y2="260"/>

<rect class="box" x="220" y="260" width="360" height="50"/>
<text class="title" x="400" y="283" text-anchor="middle">RAG 问答引擎</text>
<text class="desc" x="400" y="303" text-anchor="middle">检索 + 生成管道</text>

<line class="arrow" x1="320" y1="310" x2="320" y2="345"/>
<line class="arrow" x1="480" y1="310" x2="480" y2="345"/>

<rect class="box" x="210" y="345" width="180" height="60"/>
<text class="title" x="300" y="368" text-anchor="middle">FAISS 向量索引</text>
<text class="desc" x="300" y="388" text-anchor="middle">5833 条招股书向量</text>
<text class="desc" x="300" y="403" text-anchor="middle">📦 容器内本地存储</text>

<rect class="box" x="410" y="345" width="180" height="60"/>
<text class="title" x="500" y="368" text-anchor="middle">bge-small 模型</text>
<text class="desc" x="500" y="388" text-anchor="middle">中文嵌入</text>
<text class="desc" x="500" y="403" text-anchor="middle">📦 容器内本地加载</text>

<!-- API调用 -->
<line class="arrow" x1="400" y1="470" x2="400" y2="510"/>

<rect class="box" x="250" y="510" width="300" height="60" stroke="#f0883e" stroke-width="2"/>
<text class="title" x="400" y="538" text-anchor="middle" fill="#f0883e">☁ 通义千问 API (qwen-turbo)</text>
<text class="desc" x="400" y="558" text-anchor="middle">云端 LLM 生成</text>

<!-- 说明 -->
<text x="30" y="590" fill="#8b949e" font-size="11">容器持久化: docker volume finance-qa-data | 端口: 8520 | 架构: aarch64</text>
</svg>
</body>
</html>
