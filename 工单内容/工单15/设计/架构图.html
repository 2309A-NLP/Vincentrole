<!DOCTYPE html>
<html lang="zh">
<head><meta charset="utf-8"><title>工单15 架构图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;justify-content:center;padding:40px;font-family:'Segoe UI',sans-serif}
svg{width:780px;height:620px}
text{font-family:'Segoe UI',sans-serif}
.box{fill:#1a2332;stroke:#30363d;stroke-width:2;rx:8;ry:8}
.title{fill:#58a6ff;font-size:15px;font-weight:600}
.desc{fill:#8b949e;font-size:12px}
.arrow{stroke:#58a6ff;stroke-width:2;fill:none;marker-end:url(#a)}
.good{fill:#3fb950;font-size:13px;font-weight:600}
.hl{stroke:#d2a8ff;stroke-width:2}
</style>
</head>
<body>
<svg viewBox="0 0 780 620">
<defs><marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/></marker></defs>

<text x="390" y="30" fill="#f0f6fc" font-size="18" font-weight="700" text-anchor="middle">工单15 — 跨模态检索优化架构</text>

<!-- 入口 -->
<rect class="box" x="290" y="55" width="200" height="55"/>
<text class="title" x="390" y="78" text-anchor="middle">用户问题输入</text>
<text class="desc" x="390" y="98" text-anchor="middle">"编号13相对于编号12的位置关系？"</text>

<line class="arrow" x1="390" y1="110" x2="390" y2="155"/>

<!-- 查询理解 -->
<rect class="box hl" x="240" y="155" width="300" height="65"/>
<text class="title" x="390" y="178" text-anchor="middle" fill="#d2a8ff">① 查询理解 (Query Understanding)</text>
<text class="desc" x="390" y="198" text-anchor="middle">检测"图3""第11页" → 自动加载 patent_images/p11.png</text>

<line class="arrow" x1="200" y1="190" x2="235" y2="190"/>
<text x="100" y="185" fill="#8b949e" font-size="11">纯文本路径</text>
<line class="arrow" x1="545" y1="190" x2="580" y2="190"/>
<text x="585" y="185" fill="#8b949e" font-size="11">视觉路径</text>

<!-- 分叉: 文本 + 图片 -->
<rect class="box" x="85" y="250" width="230" height="65"/>
<text class="title" x="200" y="273" text-anchor="middle">② 文本检索</text>
<text class="desc" x="200" y="293" text-anchor="middle">FAISS 向量 + BM25</text>

<rect class="box" x="465" y="250" width="230" height="65"/>
<text class="title" x="580" y="273" text-anchor="middle">② 图片增强检索</text>
<text class="desc" x="580" y="293" text-anchor="middle">"图3 编号13 位置关系" 增强查询</text>

<line class="arrow" x1="200" y1="315" x2="310" y2="360"/>
<line class="arrow" x1="580" y1="315" x2="470" y2="360"/>

<!-- 融合 -->
<rect class="box hl" x="290" y="360" width="200" height="60"/>
<text class="title" x="390" y="383" text-anchor="middle" fill="#d2a8ff">③ RRF 融合</text>
<text class="desc" x="390" y="403" text-anchor="middle">多路召回融合排序</text>

<line class="arrow" x1="390" y1="420" x2="390" y2="460"/>

<!-- VL 回答 -->
<rect class="box hl" x="240" y="460" width="300" height="65"/>
<text class="title" x="390" y="483" text-anchor="middle" fill="#d2a8ff">④ VL 模型回答</text>
<text class="desc" x="390" y="503" text-anchor="middle">qwen-vl-plus: 图片 + 文本 → 答案</text>

<line class="arrow" x1="390" y1="525" x2="390" y2="560"/>

<!-- 结果 -->
<rect class="box" x="290" y="560" width="200" height="45" stroke="#3fb950" stroke-width="2"/>
<text class="title" x="390" y="583" text-anchor="middle" fill="#3fb950">✅ 100% 准确率</text>

<text x="30" y="615" fill="#8b949e" font-size="11">关键优化: 查询理解检测视觉引用 → 多路召回 → RRF融合 → VL模型图文联合推理</text>
</svg>
</body>
</html>
